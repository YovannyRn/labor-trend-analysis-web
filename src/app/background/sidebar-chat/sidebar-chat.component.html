<div
  class="sidebar-shell h-100 d-flex flex-column"
  [class.collapsed]="isCollapsed"
>
  <!-- Header -->
  <div class="sidebar-header">
    <div class="sidebar-header-inner">
      <span class="sidebar-title" *ngIf="!isCollapsed">
        <i class="bi bi-layout-text-sidebar-reverse me-2"></i>Mis Chats
      </span>
      <div class="sidebar-header-actions">
        <button
          class="sidebar-btn-new"
          (click)="createNewChat()"
          title="Nuevo chat"
          *ngIf="!isCollapsed"
        >
          <i class="bi bi-plus"></i> Nuevo
        </button>
        <button
          class="sidebar-btn-toggle"
          (click)="toggleSidebar()"
          [title]="isCollapsed ? 'Expandir' : 'Colapsar'"
        >
          <i
            class="bi"
            [class.bi-chevron-right]="isCollapsed"
            [class.bi-chevron-left]="!isCollapsed"
          ></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Lista de sesiones -->
  <div class="sessions-scroll flex-grow-1">
    <!-- Sesiones -->
    <div
      *ngFor="let session of sessions; trackBy: trackBySessionId"
      class="session-card"
      [class.session-active]="isSessionActive(session)"
      (click)="selectSession(session)"
    >
      <!-- Icono colapsado -->
      <div
        class="session-icon-collapsed"
        *ngIf="isCollapsed"
        [title]="session.title"
      >
        <i [class]="getSessionIcon(session)"></i>
      </div>

      <!-- Vista expandida -->
      <div class="session-body" *ngIf="!isCollapsed">
        <!-- Título + acciones -->
        <div class="session-row" *ngIf="editingSessionId !== session.id">
          <h6 class="session-title">{{ session.title }}</h6>
          <div class="session-actions">
            <button
              class="sa-btn"
              (click)="startEditingTitle(session, $event)"
              title="Editar"
            >
              <i class="bi bi-pencil"></i>
            </button>
            <button
              class="sa-btn"
              (click)="exportSession(session, $event)"
              title="Exportar"
            >
              <i class="bi bi-download"></i>
            </button>
            <button
              class="sa-btn sa-btn-del"
              (click)="deleteSession(session, $event)"
              title="Eliminar"
            >
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>

        <!-- Edición de título -->
        <div class="session-edit" *ngIf="editingSessionId === session.id">
          <input
            type="text"
            class="session-input"
            [(ngModel)]="editingTitle"
            (keydown)="onTitleKeyPress($event)"
            (blur)="saveTitle()"
            #titleInput
          />
          <div class="d-flex gap-1 justify-content-end mt-1">
            <button class="sa-btn sa-btn-ok" (click)="saveTitle()">
              <i class="bi bi-check"></i>
            </button>
            <button class="sa-btn" (click)="cancelEditing()">
              <i class="bi bi-x"></i>
            </button>
          </div>
        </div>

        <!-- Preview -->
        <p class="session-preview">{{ getLastMessagePreview(session) }}</p>

        <!-- Meta -->
        <div class="session-meta">
          <span
            ><i class="bi bi-chat-dots"></i> {{ session.messages.length }}</span
          >
          <span
            ><i class="bi bi-clock"></i>
            {{ formatLastUpdate(session.updatedAt) }}</span
          >
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" *ngIf="sessions.length === 0 && !isCollapsed">
      <div class="empty-icon"><i class="bi bi-chat-square-dots"></i></div>
      <p class="empty-title">Sin conversaciones</p>
      <small class="empty-sub">Crea tu primer chat para empezar</small>
    </div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="!isCollapsed && sessions.length > 0">
    <span class="footer-count"
      ><i class="bi bi-database me-1"></i>{{ sessions.length }} chats
      guardados</span
    >
    <button class="footer-clear-btn" (click)="clearAllChats()">
      <i class="bi bi-trash me-1"></i>Limpiar todo
    </button>
  </div>
</div>
