<div class="chart-container">
  <ngx-charts-bar-vertical-2d
    [view]="[900, 500]"
    [scheme]="colorScheme"
    [results]="data"
    [gradient]="true"
    [xAxis]="true"
    [yAxis]="true"
    [legend]="true"
    [showXAxisLabel]="true"
    [xAxisLabel]="'Año'"
    [showYAxisLabel]="true"
    [yAxisLabel]="'Empleos por Sector'"
    [groupPadding]="10"
  >
  </ngx-charts-bar-vertical-2d>
</div>
