<div class="w-50 my-3 mx-3 bg-white border border-0 border-light rounded-3 shadow-sm">
  <ngx-charts-bar-vertical-2d
    [view]="[900, 500]"
    [scheme]="colorScheme"
    [results]="data"
    [gradient]="true"
    [xAxis]="true"
    [yAxis]="true"
    [legend]="true"
    [showXAxisLabel]="true"
    [xAxisLabel]="'Año'"
    [showYAxisLabel]="true"
    [yAxisLabel]="'Empleos por Sector'"
    [groupPadding]="10"
  >
  </ngx-charts-bar-vertical-2d>
</div>
