<div
  class="w-100 vh-100 d-flex justify-content-center align-items-center row g-0 z-3"
>
  <div class="w-50">
    <div
      class="w-100 h-auto d-flex justify-content-center align-items-center row g-0 text-center text-white"
    >
      <h1 class="fw-bold my-2">WorkNav</h1>
      <h5 class="fw-bold">Encuentra el trabajo ideal para ti</h5>
    </div>
    <div>
      <div class="position-relative w-50 mx-auto my-3">
        <input
          type="text"
          class="form-control bg-secondary rounded-3 shadow-lg border border-1 border-secondary pr-5 text-white"
          placeholder="Buscar"
          aria-label="Buscar trabajo"
          [(ngModel)]="searchText"
          (keyup.enter)="sendSearch()"
        />
        <i
          type="button"
          class="bi bi-send position-absolute top-50 end-0 translate-middle-y me-3 text-white"
          style="cursor: pointer"
          (click)="sendSearch()"
        ></i>
      </div>
      <div *ngIf="loading" class="text-center text-white">Buscando...</div>
      <div *ngIf="result" class="text-center text-white">{{ result }}</div>
      <label for="exampleDataList" class="form-label"></label>
    </div>
  </div>
</div>
