<header class="header px-5">
  <div class="logo">
    <img class="logo-img ms-5" src="Adobe Express - file.png" alt="Logo" />
    <span>WorkNav</span>
  </div>

  <div class="user-actions">
    <span class="username fs-6 mx-3">Hola, {{ " " + username }}</span>
    <div class="user-icon-container">
      <span
        class="user-icon fs-6 bg-danger text-white btn btn-white"
        (click)="toggleUserPopup()"
        title="Ver perfil de usuario"
      >
        <i class="bi bi-person-fill"></i>
      </span>

      <!-- Popup de información del usuario -->
      <div class="user-popup" *ngIf="showUserPopup">
        <div class="popup-header">
          <h5>Información del Usuario</h5>
          <button class="close-btn" (click)="closeUserPopup()">
            <i class="bi bi-x"></i>
          </button>
        </div>
        <div class="popup-content" *ngIf="!isLoadingUserInfo && userInfo">
          <div class="user-avatar">
            <i class="bi bi-person-circle"></i>
          </div>
          <div class="user-details">
            <div class="detail-item">
              <label>ID:</label>
              <span>{{ userInfo.id }}</span>
            </div>
            <div class="detail-item">
              <label>Usuario:</label>
              <span>{{ username }}</span>
            </div>
            <div class="detail-item">
              <label>Nombre:</label>
              <span>{{ userInfo.firstName }}</span>
            </div>
            <div class="detail-item" *ngIf="userInfo.lastName">
              <label>Apellido:</label>
              <span>{{ userInfo.lastName }}</span>
            </div>
            <div class="detail-item">
              <label>Email:</label>
              <span>{{ userInfo.address }}</span>
            </div>
            <div class="detail-item">
              <label>Miembro desde:</label>
              <span>{{ formatDate(userInfo.createdAt) }}</span>
            </div>
          </div>
        </div>

        <div class="popup-loading" *ngIf="isLoadingUserInfo">
          <div class="spinner">
            <i class="bi bi-arrow-clockwise"></i>
          </div>
          <span>Cargando información...</span>
        </div>
      </div>
    </div>

    <button class="logout-btn ms-3 me-5" (click)="closeSession()">
      Cerrar Sesión
    </button>
  </div>

  <!-- Overlay para cerrar el popup al hacer clic fuera -->
  <div
    class="popup-overlay"
    *ngIf="showUserPopup"
    (click)="closeUserPopup()"
  ></div>
</header>
