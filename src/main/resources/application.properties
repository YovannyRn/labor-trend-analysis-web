spring.application.name=tendencia-mercado-laboral

# Puerto por defecto de SpringBoot: 8080
server.port=8080

# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/webtfg
spring.datasource.username=usuariotfg
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# Nos permite ver en el terminal la query que se ha ejecutado al consultar una API. Esta línea solo puede estar en la fase de pruebas
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CONFIGURACIÓN DE LOGGING
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


