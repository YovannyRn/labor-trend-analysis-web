spring.application.name=tendencia-mercado-laboral

# Railway inyecta la variable PORT automaticamente
server.port=${PORT:8080}

# CONFIGURACION DE BASE DE DATOS - variables de Railway MySQL plugin
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# Produccion: sin logs SQL
spring.jpa.show-sql=false

server.servlet.context-path=/api

# URL de n8n en Railway (se configura como variable de entorno)
n8n.url=${N8N_URL:http://localhost:5678}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
